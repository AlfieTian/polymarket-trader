polymarket:
  # 凭证从 .env 自动加载，这里不需要填
  dry_run: true  # ⚠️ 未经 Alfie 授权不得改为 false

bayesian:
  prior_weight: 0.95  # 几乎完全信任市场价作为先验，只有LLM有强信号时才产生edge
  min_observations: 3

strategy:
  min_edge: 0.03
  kelly_fraction: 0.25
  max_position_usdc: 100
  max_portfolio_usdc: 1000

risk:
  max_daily_loss_usdc: 200
  max_market_concentration: 0.3

lmsr:
  b: 100000

position:
  profit_target_pct: 0.30    # 价格向有利方向移动30%时平仓
  stop_loss_pct: 0.40         # 亏损40%时止损
  pre_resolution_hours: 2.0  # 结果公布前2小时强制平仓
  min_edge_to_hold: 0.02     # edge降至2%以下时平仓（模型不再支持持仓）

trading:
  loop_interval_s: 60

logging:
  level: INFO
  file: logs/trader.log
