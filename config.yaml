polymarket:
  # Credentials are loaded from .env automatically; no need to fill here
  dry_run: false  # Live mode, authorized by Alfie on 2026-03-08

bayesian:
  prior_weight: 0.95  # Nearly full trust in market price as prior; only strong LLM signals produce edge
  min_observations: 1
  min_confidence: 0.5   # Skip opening if average LLM confidence is below this (prevents default p̂=0.05 noise bets)

strategy:
  min_edge: 0.05        # Raised to 5% to reduce noisy signals
  kelly_fraction: 0.25
  max_position_usdc: 5  # Max $5 per position
  max_portfolio_usdc: 29.00  # Available balance after deposit

risk:
  max_daily_loss_usdc: 5          # Max daily loss $5
  max_market_concentration: 0.3   # Single market <= 30% of total capital
  max_loss_per_market_usdc: 8     # No new entries if realized loss per market exceeds $8

lmsr:
  b: 100000

position:
  profit_target_pct: 0.18    # Take profit when price moves 18% in favorable direction (reduces churn)
  near_ceiling_price: 0.98   # Take profit when effective price >= this (remaining upside too small to justify waiting)
  stop_loss_pct: 0.25        # Stop loss at 25% (leave room for event market volatility)
  pre_resolution_hours: 2.0  # Force close 2 hours before resolution
  min_edge_to_hold: 0.02     # Close when edge drops below 2% (model no longer supports the position)
  exit_max_retries: 5           # Force-book after 5 failed exit retries
  exit_price_step: 0.01         # Lower price by 1 tick per retry
  force_close_cooldown_hours: 24  # Ban market for 24h after force-book to prevent immediate re-entry
  exit_cooldown_hours: 4          # Cooldown 4h after any close before re-entering the same market

trading:
  loop_interval_s: 15
  ban_sports_esports: true  # Filter out sports/esports markets (true = enabled)

logging:
  level: INFO
  file: logs/trader.log
