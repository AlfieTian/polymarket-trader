polymarket:
  # 凭证从 .env 自动加载，这里不需要填
  dry_run: true  # ⚠️ 未经 Alfie 授权不得改为 false

bayesian:
  prior_weight: 0.7
  min_observations: 3

strategy:
  min_edge: 0.03
  kelly_fraction: 0.25
  max_position_usdc: 100
  max_portfolio_usdc: 1000

risk:
  max_daily_loss_usdc: 200
  max_market_concentration: 0.3

lmsr:
  b: 100000

trading:
  loop_interval_s: 60

logging:
  level: INFO
  file: logs/trader.log
